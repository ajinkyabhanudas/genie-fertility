name: retrieval-state-ui

# Path-scoped: only runs when frontend source or this workflow changes.
# No secrets, no network calls — typecheck + component/unit tests only,
# all external calls in tests are mocked (see src/**/*.test.{ts,tsx}).
on:
  pull_request:
    paths:
      - 'src/**'
      - 'package.json'
      - 'package-lock.json'
      - 'tsconfig.json'
      - 'vite.config.ts'
      - '.github/workflows/retrieval-state-ui.yml'
  push:
    branches: [main]
    paths:
      - 'src/**'
      - 'package.json'
      - 'package-lock.json'
      - 'tsconfig.json'
      - 'vite.config.ts'
      - '.github/workflows/retrieval-state-ui.yml'

jobs:
  typecheck-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run lint

      - name: Run frontend test suite (subset-scoped to src/)
        run: npm run test
